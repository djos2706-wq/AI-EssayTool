<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Essay Improver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    textarea {
      width: 80%;
      height: 150px;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    .output {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🔥 AI Essay Improver</h1>
<p>Paste your essay → click → copy → get top-grade version</p>

<textarea id="inputText" placeholder="Paste your essay here..."></textarea><br>

<button onclick="generatePrompt()">Improve Essay</button>

<div class="output" id="outputText"></div>

<script>
function generatePrompt() {
  let input = document.getElementById("inputText").value;

  let prompt = `Rewrite this essay to a top-grade level. Improve vocabulary, clarity, structure, and arguments. Make it sound like an excellent student wrote it:

${input}`;

  document.getElementById("outputText").innerText =
`👉 Copy this prompt and paste it into ChatGPT or Claude:

${prompt}`;
}
</script>

</body>
</html>
